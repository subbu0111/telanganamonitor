name: '📰 Daily Digest (7 AM IST)'

on:
  schedule:
    # 7:00 AM IST = 1:30 AM UTC
    - cron: '30 1 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📰 Generate Daily Digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/run-digest.js

      - name: 📤 Commit & Push results
        run: |
          git config user.name "TelanganaMonitor Bot"
          git config user.email "bot@telanganamonitor.local"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📰 Auto: Daily Digest $(date -u +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
